<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки видео</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            margin: 0;
        }
        h3 {
            margin-top: 0;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        textarea, input[type="number"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        .coord-container {
            display: flex;
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .hint {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h3>Разметка текста</h3>

    <div class="form-group">
        <label for="videoText">Текст (можно в несколько строк):</label>
        <textarea id="videoText" placeholder="Введите текст..."></textarea>
    </div>

    <div class="form-group coord-container">
        <div style="flex: 1;">
            <label for="coordX">Ось X (вправо):</label>
            <input type="number" id="coordX" value="100">
        </div>
        <div style="flex: 1;">
            <label for="coordY">Ось Y (вниз):</label>
            <input type="number" id="coordY" value="300">
        </div>
    </div>
    <div class="hint">Для видео 1080x1920. X: 0-1080, Y: 0-1920. Центр: X=540, Y=960.</div>

    <button onclick="sendData()">Отправить в обработку</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('video_id');

        function sendData() {
            const textValue = document.getElementById('videoText').value;
            const xValue = parseInt(document.getElementById('coordX').value) || 0;
            const yValue = parseInt(document.getElementById('coordY').value) || 0;

            const dataObj = {
                video_id: videoId,
                text: textValue,
                x: xValue,
                y: yValue
            };

            tg.sendData(JSON.stringify(dataObj));
        }
    </script>
</body>
</html>
