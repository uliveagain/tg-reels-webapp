<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Визуальный редактор</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 10px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        textarea {
            width: 100%;
            height: 60px;
            margin-bottom: 10px;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .controls {
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .slider-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .slider-group input { flex-grow: 1; margin: 0 10px; }
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 9 / 16;
            background-color: #333;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            margin: 0 auto 15px auto;
            overflow: hidden; /* Скрывает то, что сильно вылезает за рамки визуально, но координаты считаются верно */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #draggableText {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: black;
            font-size: 50px;
            font-weight: bold;

            /* МАГИЯ ЗДЕСЬ: pre запрещает автоперенос, разрешает только ручной через Enter */
            white-space: pre;

            text-align: left;
            cursor: grab;
            user-select: none;
            padding: 5px;
            line-height: 1.2;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <textarea id="textInput" placeholder="Текст для видео..."></textarea>

    <div class="controls">
        <div class="slider-group">
            <label>Размер: <span id="sizeVal">50</span></label>
            <input type="range" id="fontSize" min="20" max="120" value="50">
        </div>
        <div class="slider-group">
            <label>Обводка: <span id="strokeVal">3</span></label>
            <input type="range" id="strokeWidth" min="0" max="15" value="3">
        </div>
    </div>

    <div class="canvas-container" id="canvas">
        <div id="draggableText"></div>
    </div>

    <button onclick="sendData()">Отправить в рендер</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('video_id');
        const bgUrl = urlParams.get('bg_url');

        const textInput = document.getElementById('textInput');
        const dragText = document.getElementById('draggableText');
        const canvas = document.getElementById('canvas');
        const fontSizeInput = document.getElementById('fontSize');
        const strokeWidthInput = document.getElementById('strokeWidth');

        if(bgUrl && bgUrl !== 'None' && bgUrl !== '') {
            canvas.style.backgroundImage = `url('${bgUrl}')`;
        }

        function applyStroke(width) {
            if (width == 0) {
                dragText.style.textShadow = "none";
                return;
            }
            let shadow = [];
            for (let angle = 0; angle < 360; angle += 15) {
                let rad = angle * Math.PI / 180;
                let x = (Math.cos(rad) * width).toFixed(1);
                let y = (Math.sin(rad) * width).toFixed(1);
                shadow.push(`${x}px ${y}px 0 white`);
            }
            dragText.style.textShadow = shadow.join(', ');
        }

        applyStroke(strokeWidthInput.value);

        textInput.addEventListener('input', () => { dragText.innerText = textInput.value; });

        fontSizeInput.addEventListener('input', (e) => {
            dragText.style.fontSize = e.target.value + 'px';
            document.getElementById('sizeVal').innerText = e.target.value;
        });

        strokeWidthInput.addEventListener('input', (e) => {
            applyStroke(e.target.value);
            document.getElementById('strokeVal').innerText = e.target.value;
        });

        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        const startDrag = (e) => {
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX;
            startY = clientY;
            initialLeft = dragText.offsetLeft;
            initialTop = dragText.offsetTop;
            dragText.style.cursor = 'grabbing';
        };

        const drag = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            dragText.style.left = `${initialLeft + (clientX - startX)}px`;
            dragText.style.top = `${initialTop + (clientY - startY)}px`;
        };

        const stopDrag = () => {
            isDragging = false;
            dragText.style.cursor = 'grab';
        };

        dragText.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', stopDrag);
        dragText.addEventListener('touchstart', startDrag, {passive: false});
        document.addEventListener('touchmove', drag, {passive: false});
        document.addEventListener('touchend', stopDrag);

        function sendData() {
            const canvasRect = canvas.getBoundingClientRect();
            const textRect = dragText.getBoundingClientRect();

            const relativeX = textRect.left - canvasRect.left;
            const relativeY = textRect.top - canvasRect.top;

            const scaleX = 1080 / canvasRect.width;
            const scaleY = 1920 / canvasRect.height;

            const finalX = Math.round(relativeX * scaleX);
            const finalY = Math.round(relativeY * scaleY);

            const dataObj = {
                video_id: videoId,
                text: textInput.value,
                x: finalX,
                y: finalY,
                font_size: parseInt(fontSizeInput.value),
                stroke_width: parseInt(strokeWidthInput.value)
            };

            tg.sendData(JSON.stringify(dataObj));
        }
    </script>
</body>
</html>
